<script>
const actions = [
"猫爬","精准跳","落地缓冲","基本落地","侧滚翻",
"蹬墙上墙","金刚跳","猫扑","侧跃","转体",
"懒人跳","屁蹲跳","猩猩跳","反身跳","定点跳",
"前空翻基础","后空翻基础","侧空翻基础","转体180","远空翻",
"双金刚","连续上墙","连贯线路","空翻衔接","转体360"
];

let students = JSON.parse(localStorage.getItem("stuData")) || [];
let editIdx = -1;

function renderList(){
let h="";
students.forEach((s,i)=>{
h+=`<div class="item" onclick="edit(${i})">${s.name}</div>`;
});
document.getElementById("stu_list").innerHTML=h;
}

function addStu(){
const name=document.getElementById("add_name").value.trim();
if(!name)return alert("请输入姓名");
let stu={name,age:document.getElementById("add_age").value};
actions.forEach((_,k)=>stu["p"+(k+1)]="未掌握");
students.push(stu);
saveData();
renderList();
alert("新增成功");
}

function edit(i){
editIdx=i;
const s=students[i];
document.getElementById("edit_title").innerText="编辑："+s.name;
document.querySelectorAll(".s").forEach((el,k)=>{
el.value=s["p"+(k+1)];
});
document.getElementById("edit_area").style.display="block";
}

function saveEdit(){
const s=students[editIdx];
document.querySelectorAll(".s").forEach((el,k)=>{
s["p"+(k+1)]=el.value;
});
saveData();
alert("保存成功");
}

function saveData(){
localStorage.setItem("stuData",JSON.stringify(students));
}

renderList();
</script>
